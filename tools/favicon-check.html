<!doctype html>
<meta charset="utf-8">
<title>favicon check</title>
<style>
  body { margin:0; display:flex; font-family:monospace; }
  section { flex:1; padding:40px; display:flex; flex-direction:column; gap:24px; align-items:flex-start; }
  .lite-strip { background:#dee1e6; } /* browser chrome light tab strip */
  .dark-strip { background:#202124; color:#eee; } /* dark tab strip */
  .row { display:flex; align-items:center; gap:16px; }
</style>
<section class="lite-strip">
  <h3>on light tab strip</h3>
  <div class="row"><img src="../public/img/favicon.svg" width="16" height="16">16</div>
  <div class="row"><img src="../public/img/favicon.svg" width="32" height="32">32</div>
  <div class="row"><img src="../public/img/favicon.svg" width="64" height="64">64</div>
  <div class="row"><img src="../public/img/favicon.svg" width="128" height="128">128</div>
  <div class="row"><img src="../public/img/favicon-32.png" width="32" height="32">32 png</div>
  <div class="row"><img src="../public/img/apple-touch-icon.png" width="64" height="64">touch</div>
</section>
<section class="dark-strip">
  <h3>on dark tab strip</h3>
  <div class="row"><img src="../public/img/favicon.svg" width="16" height="16">16</div>
  <div class="row"><img src="../public/img/favicon.svg" width="32" height="32">32</div>
  <div class="row"><img src="../public/img/favicon.svg" width="64" height="64">64</div>
  <div class="row"><img src="../public/img/favicon.svg" width="128" height="128">128</div>
</section>
